<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulacao SAEP | Cadastro de Tarefas</title>
    <link rel="stylesheet" href="/assets/css/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="wrapper topbar-content">
        <div>
          <h1>Cadastro de tarefas</h1>
        </div>
        <nav class="nav-links" aria-label="Navegacao principal">
          <a href="/">Tarefas</a>
          <a href="/cadastro">Usuarios</a>
          <a class="active" href="/tarefas">Nova tarefa</a>
        </nav>
      </div>
    </header>

    <main class="wrapper page-content">
      <section class="panel">
        <h2>Nova tarefa</h2>
        <p class="section-text">
          O status inicial da tarefa sera cadastrado como "a fazer".
        </p>

        <div id="mensagemTarefa" class="message hidden" role="alert"></div>

        <form id="formTarefa" class="form-grid" novalidate>
          <label class="field">
            <span>Descricao da tarefa</span>
            <textarea id="descricao" rows="4" required minlength="5"></textarea>
          </label>

          <label class="field">
            <span>Setor</span>
            <input id="setor" type="text" required minlength="2" />
          </label>

          <label class="field">
            <span>Usuario responsavel</span>
            <select id="idUsuario" required></select>
          </label>

          <label class="field">
            <span>Prioridade</span>
            <select id="prioridade" required>
              <option value="">Selecione</option>
              <option value="baixa">Baixa</option>
              <option value="media">Media</option>
              <option value="alta">Alta</option>
            </select>
          </label>

          <div class="form-actions">
            <button type="submit" class="button">Cadastrar tarefa</button>
          </div>
        </form>
      </section>
    </main>

    <script src="/assets/js/tarefas.js"></script>
  </body>
</html>
