<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0%" stop-color="#17324d"/>
      <stop offset="100%" stop-color="#2f7c85"/>
    </linearGradient>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #17324d; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #51606f; }
      .entityTitle { font: 700 28px Arial, sans-serif; fill: #ffffff; }
      .attr { font: 500 22px Arial, sans-serif; fill: #1f2933; }
      .small { font: 600 18px Arial, sans-serif; fill: #51606f; }
      .card { fill: #fffdf8; stroke: #17324d; stroke-width: 3; rx: 24; }
      .head { fill: url(#bg); rx: 24; }
      .line { stroke: #17324d; stroke-width: 4; }
    </style>
  </defs>
  <rect width="1400" height="900" fill="#f4f1e9"/>
  <text x="90" y="90" class="title">Diagrama Entidade-Relacionamento</text>
  <text x="90" y="128" class="subtitle">Sistema de gerenciamento de tarefas com usuarios e tarefas vinculadas em relacao 1:N</text>

  <rect x="110" y="190" width="430" height="420" class="card"/>
  <rect x="110" y="190" width="430" height="88" class="head"/>
  <text x="325" y="245" text-anchor="middle" class="entityTitle">USUARIOS</text>
  <text x="145" y="335" class="attr">PK id : serial</text>
  <text x="145" y="390" class="attr">nome : varchar(120) NOT NULL</text>
  <text x="145" y="445" class="attr">email : varchar(160) NOT NULL UNIQUE</text>

  <rect x="860" y="170" width="430" height="520" class="card"/>
  <rect x="860" y="170" width="430" height="88" class="head"/>
  <text x="1075" y="225" text-anchor="middle" class="entityTitle">TAREFAS</text>
  <text x="895" y="315" class="attr">PK id : serial</text>
  <text x="895" y="368" class="attr">FK id_usuario : integer NOT NULL</text>
  <text x="895" y="421" class="attr">descricao : text NOT NULL</text>
  <text x="895" y="474" class="attr">setor : varchar(120) NOT NULL</text>
  <text x="895" y="527" class="attr">prioridade : baixa | media | alta</text>
  <text x="895" y="580" class="attr">data_cadastro : timestamp</text>
  <text x="895" y="633" class="attr">status : a fazer | fazendo | pronto</text>

  <line x1="540" y1="410" x2="860" y2="410" class="line"/>
  <circle cx="700" cy="410" r="72" fill="#fffdf8" stroke="#17324d" stroke-width="4"/>
  <text x="700" y="404" text-anchor="middle" class="attr">possui</text>
  <text x="700" y="438" text-anchor="middle" class="small">1 usuario para N tarefas</text>

  <text x="575" y="380" class="small">1</text>
  <text x="815" y="380" class="small">N</text>

  <text x="90" y="780" class="subtitle">Regras: todos os campos obrigatorios; cada tarefa pertence a um unico usuario; um usuario pode ter varias tarefas.</text>
</svg>
