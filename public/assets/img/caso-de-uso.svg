<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <linearGradient id="usecase" x1="0" x2="1">
      <stop offset="0%" stop-color="#17324d"/>
      <stop offset="100%" stop-color="#2f7c85"/>
    </linearGradient>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #17324d; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #51606f; }
      .label { font: 600 24px Arial, sans-serif; fill: #1f2933; }
      .small { font: 500 18px Arial, sans-serif; fill: #51606f; }
      .case { fill: #fffdf8; stroke: #17324d; stroke-width: 3; }
      .frame { fill: none; stroke: url(#usecase); stroke-width: 4; rx: 32; }
      .line { stroke: #17324d; stroke-width: 3; }
    </style>
  </defs>
  <rect width="1400" height="900" fill="#f4f1e9"/>
  <text x="90" y="90" class="title">Diagrama de Caso de Uso</text>
  <text x="90" y="128" class="subtitle">Ator principal interagindo com cadastro, consulta, edicao, exclusao e atualizacao das tarefas.</text>

  <rect x="330" y="180" width="900" height="600" rx="32" class="frame"/>
  <text x="780" y="220" text-anchor="middle" class="label">Sistema de Gerenciamento de Tarefas</text>

  <ellipse cx="750" cy="300" rx="210" ry="52" class="case"/>
  <text x="750" y="308" text-anchor="middle" class="label">Cadastrar usuario</text>

  <ellipse cx="750" cy="395" rx="230" ry="52" class="case"/>
  <text x="750" y="403" text-anchor="middle" class="label">Cadastrar tarefa</text>

  <ellipse cx="750" cy="490" rx="260" ry="52" class="case"/>
  <text x="750" y="498" text-anchor="middle" class="label">Visualizar tarefas em Kanban</text>

  <ellipse cx="750" cy="585" rx="235" ry="52" class="case"/>
  <text x="750" y="593" text-anchor="middle" class="label">Editar tarefa</text>

  <ellipse cx="750" cy="680" rx="255" ry="52" class="case"/>
  <text x="750" y="688" text-anchor="middle" class="label">Excluir e alterar status da tarefa</text>

  <circle cx="160" cy="400" r="34" fill="#17324d"/>
  <line x1="160" y1="434" x2="160" y2="545" class="line"/>
  <line x1="110" y1="470" x2="210" y2="470" class="line"/>
  <line x1="160" y1="545" x2="110" y2="620" class="line"/>
  <line x1="160" y1="545" x2="210" y2="620" class="line"/>
  <text x="160" y="660" text-anchor="middle" class="label">Usuario</text>

  <line x1="194" y1="400" x2="520" y2="300" class="line"/>
  <line x1="194" y1="420" x2="500" y2="395" class="line"/>
  <line x1="194" y1="450" x2="460" y2="490" class="line"/>
  <line x1="194" y1="485" x2="500" y2="585" class="line"/>
  <line x1="194" y1="515" x2="470" y2="680" class="line"/>

  <text x="90" y="800" class="small">Nao ha autenticacao no escopo. O ator "Usuario" representa o operador do sistema.</text>
</svg>
