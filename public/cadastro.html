<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulacao SAEP | Cadastro de Usuarios</title>
    <link rel="stylesheet" href="/assets/css/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="wrapper topbar-content">
        <div>
          <h1>Cadastro de usuarios</h1>
         
        </div>
        <nav class="nav-links" aria-label="Navegacao principal">
          <a href="/">Tarefas</a>
          <a class="active" href="/cadastro">Usuarios</a>
          <a href="/tarefas">Nova tarefa</a>
        </nav>
      </div>
    </header>

    <main class="wrapper page-content two-panels">
      <section class="panel">
        <h2>Novo usuario</h2>
        <p class="section-text">
          Preencha nome e e-mail. Os dois campos sao obrigatorios.
        </p>

        <div id="mensagem" class="message hidden" role="alert"></div>

        <form id="formCadastro" class="form-grid" novalidate>
          <label class="field">
            <span>Nome</span>
            <input id="nome" name="nome" type="text" required minlength="3" />
          </label>

          <label class="field">
            <span>E-mail</span>
            <input id="email" name="email" type="email" required />
          </label>

          <div class="form-actions">
            <button type="submit" class="button">Cadastrar usuario</button>
          </div>
        </form>
      </section>

      <section class="panel">
        <div class="section-header">
          <div>
            <h2>Usuarios cadastrados</h2>
            <p class="section-text">Aqui voce pode consultar, editar e excluir usuarios.</p>
          </div>
          <button id="atualizarListaUsuarios" class="button button-secondary" type="button">
            Atualizar
          </button>
        </div>

        <div id="listaUsuarios" class="stack-list"></div>
      </section>
    </main>

    <section id="modalUsuario" class="modal hidden" aria-hidden="true">
      <div class="modal-backdrop" data-close-user-modal="true"></div>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="tituloModalUsuario">
        <div class="modal-header">
          <h2 id="tituloModalUsuario">Editar usuario</h2>
          <button type="button" class="icon-button" data-close-user-modal="true" aria-label="Fechar">
            x
          </button>
        </div>

        <form id="formEdicaoUsuario" class="form-grid">
          <input type="hidden" id="edicaoUsuarioId" />

          <label class="field">
            <span>Nome</span>
            <input id="edicaoUsuarioNome" type="text" required minlength="3" />
          </label>

          <label class="field">
            <span>E-mail</span>
            <input id="edicaoUsuarioEmail" type="email" required />
          </label>

          <div class="form-actions">
            <button type="button" class="button button-secondary" data-close-user-modal="true">Cancelar</button>
            <button type="submit" class="button">Salvar alteracoes</button>
          </div>
        </form>
      </div>
    </section>

    <script src="/assets/js/usuarios.js"></script>
  </body>
</html>
