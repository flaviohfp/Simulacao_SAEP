<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de Usuarios | Simulacao SAEP</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/assets/css/style.css" />
  </head>
  <body>
    <header class="app-header shadow-sm">
      <div class="container py-3">
        <div class="d-flex flex-column flex-lg-row align-items-lg-center gap-3">
          <div class="me-lg-auto">
            <p class="eyebrow mb-1">Simulacao SAEP</p>
            <h1 class="h3 mb-1">Cadastro de Usuarios</h1>
            <p class="mb-0 text-white-50">
              Formulario com validacao obrigatoria e persistencia no banco.
            </p>
          </div>
          <nav class="nav nav-pills app-nav">
            <a class="nav-link" href="/">Gerenciar tarefas</a>
            <a class="nav-link active" href="/cadastro">Cadastro de usuarios</a>
            <a class="nav-link" href="/tarefas">Cadastro de tarefas</a>
          </nav>
        </div>
      </div>
    </header>

    <main class="container py-4 py-lg-5">
      <div class="row g-4">
        <div class="col-lg-5">
          <section class="form-card">
            <h2 class="h4 mb-3">Novo usuario</h2>
            <p class="text-secondary mb-4">
              Todos os campos sao obrigatorios e o e-mail deve ter formato valido.
            </p>
            <div id="mensagem" class="alert d-none" role="alert"></div>
            <form id="formCadastro" novalidate>
              <div class="mb-3">
                <label for="nome" class="form-label">Nome</label>
                <input id="nome" name="nome" type="text" class="form-control" required minlength="3" />
              </div>
              <div class="mb-4">
                <label for="email" class="form-label">E-mail</label>
                <input id="email" name="email" type="email" class="form-control" required />
              </div>
              <button type="submit" class="btn btn-primary w-100">Cadastrar usuario</button>
            </form>
          </section>
        </div>
        <div class="col-lg-7">
          <section class="form-card">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h2 class="h4 mb-0">Usuarios cadastrados</h2>
              <button id="atualizarListaUsuarios" class="btn btn-outline-primary btn-sm" type="button">
                Atualizar lista
              </button>
            </div>
            <div id="listaUsuarios" class="list-group gap-3"></div>
          </section>
        </div>
      </div>
    </main>

    <script src="/assets/js/usuarios.js"></script>
  </body>
</html>
